# =========================================================================
# LithnetRMA PowerShell module build & publish pipeline
# =========================================================================
# Builds the PowerShell module, signs the assemblies, manifest, and package
# with the Lithnet EV code-signing certificate, builds and signs the MSI
# installer with Advanced Installer, and runs the Pester suite against the
# lab MIM service as a release gate. Publishing is gated on that test stage:
# the internal Azure Artifacts feed only ever receives packages that have
# passed the full suite, and (after approval) a GitHub release is created
# with the installer and module package, then published to the public
# PSGallery.
#
# Signing split:
#   * codesign.yaml signs the module assembly, manifest, and loader before
#     they are packaged, so both the .nupkg and the MSI embed signed files.
#   * build-advanced-installer-package.yaml (sign: true) signs the MSI
#     itself during the Advanced Installer build.
#
# Test gate:
#   * The UnitTest1 lab VM (u1w2025x64-ad) is deallocated when idle, so the
#     pipeline starts it by tag before testing and deallocates it afterwards
#     using the shared release-tools VM lifecycle templates.
#   * The test stage runs on the self-hosted UnitTest1 pool, which has line
#     of sight to the lab MIM service (fimsvc). It tests the exact signed
#     module artifact produced by the build stage, on both Windows
#     PowerShell 5.1 and PowerShell 7. Publishing cannot proceed unless
#     every test passes.
#
# All signing and publishing is delegated to the shared release-tools repo.
# No signing-vault or feed details live in this file.
# =========================================================================

pool:
  vmImage: 'windows-latest'

variables:
  - name: buildConfiguration
    value: 'Release'
  - name: build.version.major
    value: 2
  - name: build.version.minor
    value: 0
  - name: build.version.revision
    value: $[counter(format('{0}.{1}', variables['build.version.major'], variables['build.version.minor']), 0)]
  - name: build.version
    value: $(build.version.major).$(build.version.minor).$(build.version.revision)
  - name: build.date
    value: $[format('{0:yyyy}-{0:MM}-{0:dd}T{0:HH}:{0:mm}:{0:ss}', pipeline.startTime)]

  - name: azureSubscription
    value: 'ProductionServices'

  # The lab test environment: VMs tagged environment=testEnvironment in
  # testResourceGroup back the agent pool of the same name. They are
  # deallocated when idle; the pipeline starts and stops them around the
  # test stage. devAzureSubscription is the service connection with rights
  # on that resource group.
  - name: testEnvironment
    value: 'UnitTest1'
  - name: testResourceGroup
    value: 'rg-ams-testhosts'
  - name: devAzureSubscription
    value: 'DevEnvironment'

  - name: tfmCore
    value: 'net8.0'
  - name: tfmDesktop
    value: 'net48'

  - name: projectPath
    value: '$(Build.SourcesDirectory)/resourcemanagement-powershell/src/Lithnet.ResourceManagement.Automation/Lithnet.ResourceManagement.Automation.csproj'
  - name: publishDir
    value: '$(Build.ArtifactStagingDirectory)/publish'
  # The assembled module folder doubles as the Advanced Installer harvest
  # source, so it must sit at the path the .aip synchronizes (next to it).
  - name: setupDir
    value: '$(Build.SourcesDirectory)/resourcemanagement-powershell/src/Lithnet.ResourceManagement.Automation.Setup'
  - name: aipPath
    value: '$(setupDir)/Lithnet.ResourceManagement.Automation.Setup.aip'
  - name: moduleDir
    value: '$(setupDir)/LithnetRMA'
  - name: nupkgDir
    value: '$(Build.ArtifactStagingDirectory)/nupkg'
  # Backslash separator: Advanced Installer's SetOutputLocation rejects
  # mixed-separator paths.
  - name: installerDir
    value: '$(Build.ArtifactStagingDirectory)\installer'

name: $(build.version.major).$(build.version.minor).$(build.version.revision)
trigger: none

resources:
  repositories:
  - repository: release_tools
    type: git
    name: release-tools/release-tools
    ref: master

stages:
# ── Build, sign, and publish to internal feed ────────────────────────────
- stage: build
  displayName: Build, sign and package
  dependsOn: []
  jobs:
    - job: build_job
      displayName: Build and package
      steps:
        - checkout: self
          path: s/resourcemanagement-powershell
        - checkout: release_tools
          path: release-tools

        - task: NuGetAuthenticate@1
          displayName: Authenticate with NuGet

        - task: DotNetCoreCLI@2
          displayName: dotnet publish (core)
          inputs:
            command: publish
            projects: '$(projectPath)'
            arguments: '-c $(buildConfiguration) -f $(tfmCore) -p:Version=$(build.version) -o $(publishDir)/$(tfmCore)'
            publishWebProjects: false
            zipAfterPublish: false

        - task: DotNetCoreCLI@2
          displayName: dotnet publish (desktop)
          inputs:
            command: publish
            projects: '$(projectPath)'
            arguments: '-c $(buildConfiguration) -f $(tfmDesktop) -p:Version=$(build.version) -o $(publishDir)/$(tfmDesktop)'
            publishWebProjects: false
            zipAfterPublish: false

        # Stamp the module manifest with the pipeline version.
        - pwsh: |
            Get-ChildItem '$(publishDir)' -Recurse -Filter 'LithnetRMA.psd1' | ForEach-Object {
                (Get-Content -Path $_.FullName -Raw) -replace "ModuleVersion = '.*'", "ModuleVersion = '$(build.version)'" | Set-Content -Path $_.FullName -NoNewline
                Write-Host "Stamped $($_.FullName)"
            }
          displayName: Stamp module version

        # Sign all assemblies and scripts BEFORE packaging.
        - template: templates/codesign.yaml@release_tools
          parameters:
            path:
              - '$(publishDir)/**/Lithnet.ResourceManagement.Automation.dll'
              - '$(publishDir)/**/LithnetRMA.psd1'
              - '$(publishDir)/**/LithnetRMA.psm1'
            environment: 'prod'
            azureSubscription: '$(azureSubscription)'
            description: 'Lithnet Resource Management PowerShell Module'

        # Assemble the module folder and create a .nupkg from it.
        - pwsh: |
            $dest = '$(moduleDir)'
            $nupkg = '$(nupkgDir)'
            New-Item -ItemType Directory -Force -Path "$dest/en-us", "$dest/coreclr", "$dest/desktop", $nupkg | Out-Null

            # dotnet publish -o creates a project-named subdirectory; find it dynamically.
            $coreDir = Get-ChildItem '$(publishDir)/$(tfmCore)' -Directory | Select-Object -First 1 -ExpandProperty FullName
            $desktopDir = Get-ChildItem '$(publishDir)/$(tfmDesktop)' -Directory | Select-Object -First 1 -ExpandProperty FullName

            # Module root: manifest, loader, help
            Copy-Item "$coreDir/LithnetRMA.psd1" $dest
            Copy-Item "$coreDir/LithnetRMA.psm1" $dest
            Copy-Item "$coreDir/en-us/Lithnet.ResourceManagement.Automation.dll-help.xml" "$dest/en-us/"

            # coreclr: all core DLLs flat
            Get-ChildItem "$coreDir/*.dll" | Copy-Item -Destination "$dest/coreclr/"

            # desktop: all desktop DLLs flat
            Get-ChildItem "$desktopDir/*.dll" | Copy-Item -Destination "$dest/desktop/"

            # Create the .nupkg via a local file-system PS repository.
            Register-PSRepository -Name LocalBuild -SourceLocation $nupkg -PublishLocation $nupkg -InstallationPolicy Trusted
            Publish-Module -Path $dest -Repository LocalBuild -NuGetApiKey 'local'

            Write-Host "Module assembled at $dest"
            Write-Host "Package created:"
            Get-ChildItem $nupkg | ForEach-Object { Write-Host "  $($_.Name) ($([math]::Round($_.Length / 1KB)) KB)" }
          displayName: Assemble module and create package

        # Sign the NuGet package.
        - template: templates/codesign.yaml@release_tools
          parameters:
            path:
              - '$(nupkgDir)/*.nupkg'
            environment: 'prod'
            azureSubscription: '$(azureSubscription)'

        # Stamp the installer project with the pipeline version and a fresh
        # ProductCode (required for MSI major upgrades between releases).
        - pwsh: |
            New-Item -ItemType Directory -Force -Path '$(installerDir)' | Out-Null
            $aip = '$(aipPath)'
            $productCode = [guid]::NewGuid().ToString().ToUpper()
            $content = Get-Content -Path $aip -Raw
            $content = $content -replace '(<ROW Property="ProductVersion" Value=")[^"]*(")', '${1}$(build.version)${2}'
            $content = $content -replace '(<ROW Property="ProductCode" Value="1033:\{)[0-9A-F-]+(\} ")', "`${1}$productCode`${2}"
            Set-Content -Path $aip -Value $content -NoNewline
            Write-Host "Stamped $aip with version $(build.version), ProductCode {$productCode}"
          displayName: Stamp installer version

        # Build and sign the MSI. The .aip harvests the assembled module
        # folder ($(moduleDir)) at build time via its synchronized folder.
        - template: templates/build-advanced-installer-package.yaml@release_tools
          parameters:
            aipPath: '$(aipPath)'
            aipPackageName: 'LithnetRMA.msi'
            azureSubscription: '$(azureSubscription)'
            environment: 'prod'
            outputFolder: '$(installerDir)'
            sign: true

        - task: PublishPipelineArtifact@1
          displayName: Publish module artifact
          inputs:
            targetPath: '$(moduleDir)'
            publishLocation: 'pipeline'
            artifact: LithnetRMA

        - task: PublishPipelineArtifact@1
          displayName: Publish nupkg artifact
          inputs:
            targetPath: '$(nupkgDir)'
            publishLocation: 'pipeline'
            artifact: nupkg

        - task: PublishPipelineArtifact@1
          displayName: Publish installer artifact
          inputs:
            targetPath: '$(installerDir)'
            publishLocation: 'pipeline'
            artifact: installer

# ── Start the lab test VM (deallocated when idle) ────────────────────────
- stage: start_test_vms
  displayName: Start lab test VMs
  dependsOn: build
  jobs:
    - template: templates/azure-vm-start.yaml@release_tools
      parameters:
        jobName: start_test_vms
        deployEnvironment: $(testEnvironment)
        distroType: win
        resourceGroup: $(testResourceGroup)
        azureSubscription: $(devAzureSubscription)
        agentMode: pool
        targetPoolName: $(testEnvironment)
        # A cold start from deallocated regularly exceeds the template's
        # 300-second default before the agent registers.
        timeoutSeconds: 900

# ── Test the signed module against the lab MIM service (release gate) ────
# The variable group supplies the second-user credential for the approval
# tests (they skip without it, and approvals are the most complex flow, so
# they must run on every gate) and the proxy SPN for RemoteProxy cases.
#
# The full suite runs once per transport so behavioural differences between
# them are caught: on PowerShell 7 under LocalProxy, RemoteProxy, and
# DirectNetTcp; on Windows PowerShell 5.1 under DirectWsHttp, the primary
# transport for .NET Framework hosts (message-security WSHttp only works
# there). The other transports also work on 5.1 and are exercised on it by
# the approval tests inside the run; the client library's own pipeline
# covers the full runtime x transport matrix via its net472/net48 test
# targets.
- stage: test
  displayName: Pester suite against lab MIM
  dependsOn: start_test_vms
  variables:
    - group: MIM lab test credentials
  jobs:
    - job: pester_job
      displayName: Run Pester suite on both PowerShell editions
      pool: UnitTest1
      steps:
        - checkout: self
          path: s/resourcemanagement-powershell

        - download: current
          artifact: LithnetRMA

        - powershell: |
            if (-not (Get-Module Pester -ListAvailable | Where-Object { $_.Version -ge [version]'5.7.1' })) {
                Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force -SkipPublisherCheck
            }
            Import-Module Pester -MinimumVersion 5.7.1
            $config = New-PesterConfiguration
            $config.Run.Path = '$(Build.SourcesDirectory)/resourcemanagement-powershell/test/LithnetRMA.Tests'
            $config.Run.Exit = $true
            $config.Output.Verbosity = 'Detailed'
            $config.TestResult.Enabled = $true
            $config.TestResult.OutputFormat = 'NUnitXml'
            $config.TestResult.OutputPath = '$(Common.TestResultsDirectory)/pester-desktop-DirectWsHttp.xml'
            Invoke-Pester -Configuration $config
          displayName: Pester (Windows PowerShell 5.1, DirectWsHttp)
          condition: succeededOrFailed()
          env:
            LITHNETRMA_MODULE_PATH: $(Pipeline.Workspace)/LithnetRMA/LithnetRMA.psd1
            LITHNETRMA_TEST_MODE: DirectWsHttp
            LITHNETRMA_TEST_APPROVAL_PASSWORD: $(LITHNETRMA_TEST_APPROVAL_PASSWORD)

        - ${{ each mode in split('LocalProxy,RemoteProxy,DirectNetTcp', ',') }}:
          - pwsh: |
              if (-not (Get-Module Pester -ListAvailable | Where-Object { $_.Version -ge [version]'5.7.1' })) {
                  Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force -SkipPublisherCheck
              }
              Import-Module Pester -MinimumVersion 5.7.1
              $config = New-PesterConfiguration
              $config.Run.Path = '$(Build.SourcesDirectory)/resourcemanagement-powershell/test/LithnetRMA.Tests'
              $config.Run.Exit = $true
              $config.Output.Verbosity = 'Detailed'
              $config.TestResult.Enabled = $true
              $config.TestResult.OutputFormat = 'NUnitXml'
              $config.TestResult.OutputPath = '$(Common.TestResultsDirectory)/pester-coreclr-${{ mode }}.xml'
              Invoke-Pester -Configuration $config
            displayName: Pester (PowerShell 7, ${{ mode }})
            condition: succeededOrFailed()
            env:
              LITHNETRMA_MODULE_PATH: $(Pipeline.Workspace)/LithnetRMA/LithnetRMA.psd1
              LITHNETRMA_TEST_MODE: ${{ mode }}
              LITHNETRMA_TEST_APPROVAL_PASSWORD: $(LITHNETRMA_TEST_APPROVAL_PASSWORD)

        - task: PublishTestResults@2
          displayName: Publish Pester results
          condition: succeededOrFailed()
          inputs:
            testResultsFormat: 'NUnit'
            testResultsFiles: 'pester-*.xml'
            searchFolder: '$(Common.TestResultsDirectory)'
            mergeTestResults: true
            failTaskOnFailedTests: true
            testRunTitle: 'LithnetRMA Pester suite'

# ── Deallocate the lab test VM ────────────────────────────────────────────
- stage: stop_test_vms
  displayName: Stop lab test VMs
  dependsOn: test
  condition: always()
  jobs:
    - template: templates/azure-vm-stop.yaml@release_tools
      parameters:
        jobName: stop_test_vms
        deployEnvironment: $(testEnvironment)
        distroType: win
        resourceGroup: $(testResourceGroup)
        azureSubscription: $(devAzureSubscription)

# ── Publish the tested package to the internal feed ──────────────────────
# Runs only after the test gate passes, so the internal feed never holds an
# untested package.
- stage: publish_internal
  displayName: Publish to internal feed
  dependsOn: test
  condition: succeeded()
  jobs:
    - job: publish_internal_job
      displayName: Publish module package to internal feed
      steps:
        - checkout: none

        - download: current
          artifact: nupkg

        - template: templates/publish-nuget.yaml@release_tools
          parameters:
            nugetPackagePath: '$(Pipeline.Workspace)/nupkg/*.nupkg'
            publishInternal: true
            publishExternal: false

# ── Publish GitHub release (requires approval) ───────────────────────────
# Sequenced after the internal publish so the public release can never carry
# a package the internal feed does not.
- stage: publish_github
  displayName: Publish GitHub release
  dependsOn: publish_internal
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))
  jobs:
    - deployment: publish_github_job
      displayName: Publish installer and module package to GitHub releases
      environment: Github
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: none
              - download: current
                artifact: installer
              - download: current
                artifact: nupkg
              - task: GitHubRelease@1
                displayName: Create GitHub release (v$(build.version))
                inputs:
                  gitHubConnection: github.com_lithnet
                  repositoryName: '$(Build.Repository.Name)'
                  action: create
                  tagSource: userSpecifiedTag
                  tag: v$(build.version)
                  title: v$(build.version)
                  assets: |
                    $(Pipeline.Workspace)/installer/*.msi
                    $(Pipeline.Workspace)/nupkg/*.nupkg
                  isPreRelease: false
                  addChangeLog: true
                  changeLogCompareToRelease: lastFullRelease
                  changeLogType: commitBased

# ── Publish to PSGallery (requires approval) ─────────────────────────────
- stage: publish_psgallery
  displayName: Publish to PSGallery
  dependsOn: publish_github
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))
  jobs:
    - deployment: publish_module
      displayName: Publish module to PSGallery
      environment: 'Public PSGallery'
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: release_tools
                path: release-tools

              - download: current
                artifact: nupkg

              - template: templates/publish-psgallery.yaml@release_tools
                parameters:
                  nupkgPath: '$(Pipeline.Workspace)/nupkg/*.nupkg'
                  environment: 'prod'
                  azureSubscription: '$(azureSubscription)'
