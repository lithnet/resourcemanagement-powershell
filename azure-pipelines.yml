# =========================================================================
# LithnetRMA PowerShell module build & publish pipeline
# =========================================================================
# Builds the PowerShell module, signs the assembly, manifest, and package
# with the Lithnet EV code-signing certificate, publishes to the internal
# Azure Artifacts feed, and (after approval) to the public PSGallery.
#
# All signing and publishing is delegated to the shared release-tools repo.
# No signing-vault or feed details live in this file.
# =========================================================================

pool:
  vmImage: 'windows-latest'

variables:
  - name: buildConfiguration
    value: 'Release'
  - name: build.version.major
    value: 2
  - name: build.version.minor
    value: 0
  - name: build.version.revision
    value: $[counter(format('{0}.{1}', variables['build.version.major'], variables['build.version.minor']), 0)]
  - name: build.version
    value: $(build.version.major).$(build.version.minor).$(build.version.revision)
  - name: build.date
    value: $[format('{0:yyyy}-{0:MM}-{0:dd}T{0:HH}:{0:mm}:{0:ss}', pipeline.startTime)]

  - name: azureSubscription
    value: 'ProductionServices'

  - name: tfmCore
    value: 'net8.0'
  - name: tfmDesktop
    value: 'net48'

  - name: projectPath
    value: '$(Build.SourcesDirectory)/resourcemanagement-powershell/src/Lithnet.ResourceManagement.Automation/Lithnet.ResourceManagement.Automation.csproj'
  - name: publishDir
    value: '$(Build.ArtifactStagingDirectory)/publish'
  - name: moduleDir
    value: '$(Build.ArtifactStagingDirectory)/LithnetRMA'
  - name: nupkgDir
    value: '$(Build.ArtifactStagingDirectory)/nupkg'

name: $(build.version.major).$(build.version.minor).$(build.version.revision)
trigger: none

resources:
  repositories:
  - repository: release_tools
    type: git
    name: release-tools/release-tools
    ref: master

stages:
# ── Build, sign, and publish to internal feed ────────────────────────────
- stage: build
  displayName: Build, sign and package
  dependsOn: []
  jobs:
    - job: build_job
      displayName: Build and package
      steps:
        - checkout: self
          path: s/resourcemanagement-powershell
        - checkout: release_tools
          path: release-tools

        - task: NuGetAuthenticate@1
          displayName: Authenticate with NuGet

        - task: DotNetCoreCLI@2
          displayName: dotnet publish (core)
          inputs:
            command: publish
            projects: '$(projectPath)'
            arguments: '-c $(buildConfiguration) -f $(tfmCore) -p:Version=$(build.version) -o $(publishDir)/$(tfmCore)'
            publishWebProjects: false
            zipAfterPublish: false

        - task: DotNetCoreCLI@2
          displayName: dotnet publish (desktop)
          inputs:
            command: publish
            projects: '$(projectPath)'
            arguments: '-c $(buildConfiguration) -f $(tfmDesktop) -p:Version=$(build.version) -o $(publishDir)/$(tfmDesktop)'
            publishWebProjects: false
            zipAfterPublish: false

        # Stamp the module manifest with the pipeline version.
        - pwsh: |
            Get-ChildItem '$(publishDir)' -Recurse -Filter 'LithnetRMA.psd1' | ForEach-Object {
                (Get-Content -Path $_.FullName -Raw) -replace "ModuleVersion = '.*'", "ModuleVersion = '$(build.version)'" | Set-Content -Path $_.FullName -NoNewline
                Write-Host "Stamped $($_.FullName)"
            }
          displayName: Stamp module version

        # Sign all assemblies and scripts BEFORE packaging.
        - template: templates/codesign.yaml@release_tools
          parameters:
            path:
              - '$(publishDir)/**/Lithnet.ResourceManagement.Automation.dll'
              - '$(publishDir)/**/LithnetRMA.psd1'
              - '$(publishDir)/**/LithnetRMA.psm1'
            environment: 'prod'
            azureSubscription: '$(azureSubscription)'
            description: 'Lithnet Resource Management PowerShell Module'

        # Assemble the module folder and create a .nupkg from it.
        - pwsh: |
            $dest = '$(moduleDir)'
            $nupkg = '$(nupkgDir)'
            New-Item -ItemType Directory -Force -Path "$dest/en-us", "$dest/coreclr", "$dest/desktop", $nupkg | Out-Null

            # dotnet publish -o creates a project-named subdirectory; find it dynamically.
            $coreDir = Get-ChildItem '$(publishDir)/$(tfmCore)' -Directory | Select-Object -First 1 -ExpandProperty FullName
            $desktopDir = Get-ChildItem '$(publishDir)/$(tfmDesktop)' -Directory | Select-Object -First 1 -ExpandProperty FullName

            # Module root: manifest, loader, help
            Copy-Item "$coreDir/LithnetRMA.psd1" $dest
            Copy-Item "$coreDir/LithnetRMA.psm1" $dest
            Copy-Item "$coreDir/en-us/Lithnet.ResourceManagement.Automation.dll-help.xml" "$dest/en-us/"

            # coreclr: all core DLLs flat
            Get-ChildItem "$coreDir/*.dll" | Copy-Item -Destination "$dest/coreclr/"

            # desktop: all desktop DLLs flat
            Get-ChildItem "$desktopDir/*.dll" | Copy-Item -Destination "$dest/desktop/"

            # Create the .nupkg via a local file-system PS repository.
            Register-PSRepository -Name LocalBuild -SourceLocation $nupkg -PublishLocation $nupkg -InstallationPolicy Trusted
            Publish-Module -Path $dest -Repository LocalBuild -NuGetApiKey 'local'

            Write-Host "Module assembled at $dest"
            Write-Host "Package created:"
            Get-ChildItem $nupkg | ForEach-Object { Write-Host "  $($_.Name) ($([math]::Round($_.Length / 1KB)) KB)" }
          displayName: Assemble module and create package

        # Sign the NuGet package.
        - template: templates/codesign.yaml@release_tools
          parameters:
            path:
              - '$(nupkgDir)/*.nupkg'
            environment: 'prod'
            azureSubscription: '$(azureSubscription)'

        # Publish to the internal Azure Artifacts feed.
        - template: templates/publish-nuget.yaml@release_tools
          parameters:
            nugetPackagePath: '$(nupkgDir)/*.nupkg'
            publishInternal: true
            publishExternal: false

        - task: PublishPipelineArtifact@1
          displayName: Publish module artifact
          inputs:
            targetPath: '$(moduleDir)'
            publishLocation: 'pipeline'
            artifact: LithnetRMA

        - task: PublishPipelineArtifact@1
          displayName: Publish nupkg artifact
          inputs:
            targetPath: '$(nupkgDir)'
            publishLocation: 'pipeline'
            artifact: nupkg

# ── Publish to PSGallery (requires approval) ─────────────────────────────
- stage: publish_psgallery
  displayName: Publish to PSGallery
  dependsOn: build
  jobs:
    - deployment: publish_module
      displayName: Publish module to PSGallery
      environment: 'Public PSGallery'
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: release_tools
                path: release-tools

              - download: current
                artifact: nupkg

              - template: templates/publish-psgallery.yaml@release_tools
                parameters:
                  nupkgPath: '$(Pipeline.Workspace)/nupkg/*.nupkg'
                  environment: 'prod'
                  azureSubscription: '$(azureSubscription)'
